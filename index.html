    <!-- JSON-LD 结构化数据 -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "TrainHub",
      "alternateName": "TrainHub 企业培训师技能市场",

      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://withpace.github.io/trainhub/courses?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

        "@type": "ContactPoint",
        "email": "hi@trainhub.cn",
        "contactType": "customer service",
        "availableLanguage": "Chinese"
      }
    }
    </script>

    <title>TrainHub — 企业培训师技能市场</title>
